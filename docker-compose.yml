# =============================================================================
# docker-compose.yml — DRAFT, pending review with Backend/Frontend team
# =============================================================================
# This only runs the FastAPI backend locally right now. Neo4j is NOT included
# here because we're using managed AuraDB (cloud-hosted), not a local Neo4j
# container — no need to run a database container ourselves.
#
# OPEN QUESTIONS to confirm with the team before treating this as final:
#   1. Does the frontend (Expo) need its own service block here too, or does
#      it run separately via `expo start`?
#   2. Do we need a docker-compose.override.yml for local dev vs. what ships?
#   3. Any other services (e.g. a Redis cache for call state?) planned?
# =============================================================================

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./database:/app/database
    restart: unless-stopped
